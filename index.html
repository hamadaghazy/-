<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متابعة دراسة الأولاد</title>
<style>
  :root{
    --bg:#f4f6fb;
    --card:#ffffff;
    --primary:#3f6bd6;
    --primary-dark:#2f52ac;
    --danger:#e0524d;
    --danger-dark:#c43f3a;
    --success:#3fa66b;
    --text:#22273a;
    --muted:#6b7280;
    --border:#e3e7f0;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI", Tahoma, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:60px;
  }
  header{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    padding:22px 16px;
    text-align:center;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
  }
  header h1{margin:0;font-size:1.5rem;}
  header p{margin:6px 0 0;opacity:.9;font-size:.9rem;}

  .container{
    max-width:1100px;
    margin:20px auto;
    padding:0 14px;
  }

  .kids-bar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:18px;
  }
  .kid-tab{
    padding:9px 18px;
    border-radius:999px;
    background:var(--card);
    border:2px solid var(--border);
    cursor:pointer;
    font-weight:600;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:8px;
    transition:.15s;
  }
  .kid-tab.active{
    background:var(--primary);
    border-color:var(--primary);
    color:#fff;
  }
  .kid-tab .del-kid{
    background:none;border:none;color:inherit;opacity:.7;cursor:pointer;font-size:1rem;line-height:1;
  }
  .kid-tab .del-kid:hover{opacity:1;color:#ffdada;}
  .add-kid-btn{
    padding:9px 16px;
    border-radius:999px;
    border:2px dashed var(--primary);
    background:transparent;
    color:var(--primary-dark);
    cursor:pointer;
    font-weight:600;
  }

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(20,30,60,.06);
    border:1px solid var(--border);
  }
  .card h2{
    margin:0 0 14px;
    font-size:1.15rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .card h2 .badge{
    font-size:.75rem;
    background:var(--bg);
    color:var(--muted);
    padding:3px 10px;
    border-radius:999px;
    font-weight:500;
  }
  .kid-notes{
    margin-top:8px;
    font-size:.83rem;
    color:var(--muted);
    background:var(--bg);
    padding:8px 12px;
    border-radius:10px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:.92rem;
  }
  thead th{
    text-align:right;
    color:var(--muted);
    font-weight:600;
    padding:8px 6px;
    border-bottom:2px solid var(--border);
    white-space:nowrap;
  }
  tbody td{
    padding:8px 6px;
    border-bottom:1px solid var(--border);
    vertical-align:middle;
  }
  tbody tr:hover{background:#f9fafc;}
  .empty-row td{
    text-align:center;
    color:var(--muted);
    padding:20px;
  }

  input[type=text], input[type=number], input[type=date], input[type=time], select, textarea{
    width:100%;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:.9rem;
    font-family:inherit;
    background:#fff;
    color:var(--text);
  }
  input:focus, select:focus, textarea:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(63,107,214,.15);
  }

  .btn{
    border:none;
    border-radius:8px;
    padding:8px 14px;
    font-weight:600;
    cursor:pointer;
    font-size:.88rem;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-danger{background:#fdeceb;color:var(--danger-dark);}
  .btn-danger:hover{background:var(--danger);color:#fff;}
  .btn-ghost{background:var(--bg);color:var(--text);}
  .btn-ghost:hover{background:#e9edf6;}
  .btn-sm{padding:5px 10px;font-size:.8rem;}
  .icon-btn{
    background:none;border:none;cursor:pointer;font-size:1rem;padding:4px 6px;border-radius:6px;color:var(--muted);
  }
  .icon-btn:hover{background:var(--bg);color:var(--text);}
  .icon-btn.danger:hover{color:var(--danger-dark);background:#fdeceb;}

  .add-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:14px;
    align-items:end;
  }
  .add-form label{
    font-size:.78rem;
    color:var(--muted);
    margin-bottom:4px;
    display:block;
    font-weight:600;
  }
  .add-form .full{grid-column:1/-1;}
  .add-form .actions{grid-column:1/-1;text-align:left;}

  .summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
    margin-bottom:16px;
  }
  .stat{
    background:var(--bg);
    border-radius:12px;
    padding:14px;
    text-align:center;
  }
  .stat .val{font-size:1.3rem;font-weight:700;color:var(--primary-dark);}
  .stat .lbl{font-size:.8rem;color:var(--muted);margin-top:2px;}
  .stat.paid .val{color:var(--success);}
  .stat.due .val{color:var(--danger-dark);}

  .day-badge{
    background:#eaf0fd;color:var(--primary-dark);
    padding:3px 9px;border-radius:999px;font-size:.78rem;font-weight:600;white-space:nowrap;
  }
  .status-paid{color:var(--success);font-weight:700;}
  .status-due{color:var(--danger-dark);font-weight:700;}

  .toolbar{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--muted);
  }
  .empty-state h3{color:var(--text);}

  /* ----- reminders ----- */
  .reminder-card{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    background:linear-gradient(135deg,#fff7e6,#fff);border:1px solid #f0d9a8;
  }
  .reminder-card .rc-title{font-weight:700;display:flex;align-items:center;gap:6px;}
  .reminder-card .rc-lead{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--muted);}
  .reminder-card .rc-lead input{width:64px;text-align:center;}
  .reminder-card .rc-status{font-size:.82rem;}
  .rc-on{color:var(--success);font-weight:700;}
  .rc-off{color:var(--muted);}
  .rc-hint{font-size:.75rem;color:var(--muted);flex-basis:100%;margin-top:-4px;}
  .toast-wrap{
    position:fixed;inset-block-start:14px;inset-inline:0;display:flex;flex-direction:column;
    align-items:center;gap:8px;z-index:9999;pointer-events:none;padding:0 12px;
  }
  .toast{
    pointer-events:auto;background:var(--primary-dark);color:#fff;padding:12px 16px;border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:420px;width:100%;font-size:.9rem;
    display:flex;gap:10px;align-items:flex-start;animation:toastIn .25s ease;
  }
  .toast .t-close{margin-inline-start:auto;background:none;border:none;color:#fff;cursor:pointer;font-size:1.1rem;line-height:1;}
  @keyframes toastIn{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* ----- unified weekly view ----- */
  .view-toggle{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .view-toggle button{
    padding:9px 18px;border-radius:999px;border:2px solid var(--border);
    background:var(--card);cursor:pointer;font-weight:600;color:var(--text);
  }
  .view-toggle button.active{background:var(--primary);border-color:var(--primary);color:#fff;}
  .legend{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:.85rem;}
  .legend span.item{display:inline-flex;align-items:center;gap:6px;}
  .legend .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .week-day{margin-bottom:16px;}
  .week-day h3{
    margin:0 0 8px;font-size:1rem;display:flex;align-items:center;gap:8px;
    border-bottom:2px solid var(--border);padding-bottom:6px;
  }
  .week-day h3 .cnt{font-size:.72rem;color:var(--muted);font-weight:500;}
  .slot{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:10px 12px;border-radius:10px;border:1px solid var(--border);
    margin-bottom:7px;background:#fff;border-inline-start:5px solid var(--kidc,#ccc);
  }
  .slot .time{font-weight:700;min-width:96px;font-size:.9rem;}
  .slot .who{font-size:.75rem;color:#fff;padding:2px 10px;border-radius:999px;white-space:nowrap;}
  .slot .subj{font-weight:600;flex:1;min-width:120px;}
  .slot .tchr{font-size:.8rem;color:var(--muted);font-weight:400;}
  .slot .warn{margin-inline-start:auto;color:var(--danger-dark);font-weight:700;font-size:.8rem;white-space:nowrap;}
  .slot.conflict{background:#fdeceb;border-color:var(--danger);}
  .empty-day{color:var(--muted);font-size:.85rem;padding:2px;}

  @media print{
    .no-print{display:none !important;}
    body{background:#fff;}
    .card{box-shadow:none;border:1px solid #ccc;}
  }
  input[type=file]{display:none;}
</style>
</head>
<body>

<div class="toast-wrap no-print" id="toastWrap"></div>

<header>
  <h1>📚 متابعة دراسة الأولاد</h1>
  <p>الجدول الدراسي، أسماء المدرسين، والمصاريف — كل حاجة قابلة للتعديل والإضافة والحذف</p>
</header>

<div class="container">

  <div class="card reminder-card no-print" id="reminderCard"></div>

  <div class="view-toggle no-print" id="viewToggle"></div>

  <div class="kids-bar no-print" id="kidsBar"></div>

  <div id="emptyState" class="empty-state" style="display:none">
    <h3>مفيش ولاد مضافين لسه</h3>
    <p>دوس على "➕ إضافة ولد" فوق عشان تبدأ تضيف بياناته.</p>
  </div>

  <div id="kidContent"></div>

  <div class="toolbar no-print">
    <button class="btn btn-ghost btn-sm" onclick="resetToSeed()">↩️ استرجاع البيانات الأصلية</button>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇️ تصدير نسخة احتياطية</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">⬆️ استيراد نسخة</button>
    <input type="file" id="importFile" accept="application/json" onchange="importData(event)">
    <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ طباعة</button>
  </div>
</div>

        {id:'see5',title:'عربي أ. محمود — منهج أساسي (أغسطس)',amount:800,currency:'ج.م',date:'2026-08-01',paid:false,notes:'8 حصص شهريًا'}
      ]
    }
  ]};
}

let state = load();
let activeKidId = state.kids.length ? state.kids[0].id : null;
let viewMode = 'kids'; // 'kids' | 'week'

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return defaultSeed();
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

function resetToSeed(){
  if(!confirm('ده هيرجّع كل البيانات للنسخة الأصلية ويمسح أي تعديلات عملتها. متأكد؟')) return;
  state = defaultSeed();
  activeKidId = state.kids.length ? state.kids[0].id : null;
  save();
  render();
}

function addKid(){
  const name = prompt('اسم الولد/البنت؟');
  if(!name || !name.trim()) return;
  const stage = prompt('المرحلة الدراسية (مثلا: الصف الرابع الابتدائي)؟') || '';
  const notes = prompt('ملاحظات (رقم الطالب، ولي الأمر، المدرسة... اختياري)؟') || '';
  const kid = { id: uid(), name: name.trim(), stage: stage.trim(), notes: notes.trim(), subjects: [], expenses: [] };
  state.kids.push(kid);
  activeKidId = kid.id;
  save();
  render();
}

function deleteKid(id, evt){
  evt.stopPropagation();
  const kid = state.kids.find(k=>k.id===id);
  if(!kid) return;
  if(!confirm(`متأكد إنك عايز تمسح "${kid.name}" مع كل المواد والمصاريف بتاعته؟`)) return;
  state.kids = state.kids.filter(k=>k.id!==id);
  if(activeKidId === id){
    activeKidId = state.kids.length ? state.kids[0].id : null;
  }
  save();
  render();
}

function selectKid(id){
  activeKidId = id;
  render();
}

function editKidInfo(id){
  const kid = state.kids.find(k=>k.id===id);
  if(!kid) return;
  const name = prompt('اسم الولد/البنت؟', kid.name);
  if(name === null) return;
  const stage = prompt('المرحلة الدراسية؟', kid.stage || '');
  const notes = prompt('ملاحظات (رقم الطالب، ولي الأمر، المدرسة...)؟', kid.notes || '');
  kid.name = name.trim() || kid.name;
  kid.stage = (stage||'').trim();
  kid.notes = (notes||'').trim();
  save();
  render();
}

// ---------- Subjects ----------
function addSubject(kidId){
  const kid = state.kids.find(k=>k.id===kidId);
  const name = document.getElementById('subj-name').value.trim();
  const teacher = document.getElementById('subj-teacher').value.trim();

// ---------- Export / Import ----------
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'نسخة-احتياطية-متابعة-الأولاد.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.kids || !Array.isArray(data.kids)) throw new Error('صيغة غير صحيحة');
      if(!confirm('استيراد النسخة دي هيستبدل البيانات الحالية كلها، متأكد؟')) return;
      state = data;
      activeKidId = state.kids.length ? state.kids[0].id : null;
      save();
      render();
      alert('تم الاستيراد بنجاح');
    }catch(err){
      alert('الملف مش صالح: ' + err.message);
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

// إجماليات لكل عملة على حدة (لأن فيه مصاريف بالجنيه ومصاريف بالدينار)
function totalsByCurrency(expenses){
  const map = {};
  expenses.forEach(e=>{
    const cur = e.currency || 'ج.م';
    if(!map[cur]) map[cur] = {total:0, paid:0, due:0};
    const amt = Number(e.amount)||0;
    map[cur].total += amt;
    if(e.paid) map[cur].paid += amt; else map[cur].due += amt;
  });
  return map;
}
function fmtTotals(map, key){
  const parts = Object.keys(map).map(cur => `${(map[cur][key]).toLocaleString('ar-EG')} ${cur}`);
  return parts.length ? parts.join('  +  ') : '0';
}

// ---------- Unified weekly schedule ----------
const WEEK_DAYS = ['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
const KID_COLORS = ['#3f6bd6','#c9407a','#2f8f6b','#c07a1e','#7a49c9','#c43f3a','#0f8f9f'];

function kidColor(kidId){
  const i = state.kids.findIndex(k=>k.id===kidId);
  return KID_COLORS[(i<0?0:i) % KID_COLORS.length];
}

function parseMin(t){
  if(!t) return null;
  const m = /^(\d{1,2}):(\d{2})$/.exec(String(t).trim());
  if(!m) return null;
  return (+m[1])*60 + (+m[2]);
}

// يقرأ حقل اليوم (ممكن يكون فيه يومين: "السبت والثلاثاء")
function daysInText(text){
  if(!text) return [];
  const found = [];
  WEEK_DAYS.forEach(d=>{ if(text.includes(d)) found.push(d); });
  if(!found.includes('الاثنين') && text.includes('الإثنين')) found.push('الاثنين');
  return found;
}

function buildWeek(){
  const slots = [];
  state.kids.forEach(k=>{
    (k.subjects||[]).forEach(s=>{
      const days = daysInText(s.day);
      const start = parseMin(s.from);
      const end = parseMin(s.to);
      days.forEach(day=>{
        slots.push({
          day, kidId:k.id, kidName:k.name, subId:s.id, subj:s.name, teacher:s.teacher,
          from:s.from, to:s.to, start,
          end: end!=null ? end : (start!=null ? start+60 : null),
          conflict:false, conflictWith:[]
        });
      });
    });
  });

  const pairs = [];
  WEEK_DAYS.forEach(day=>{
    const ds = slots.filter(sl=>sl.day===day && sl.start!=null);
    for(let i=0;i<ds.length;i++){
      for(let j=i+1;j<ds.length;j++){
        const a=ds[i], b=ds[j];
        // حصة مشتركة (نفس المدرس ونفس الميعاد) مش تعارض — الأولاد بيحضروها مع بعض
        const shared = a.teacher && b.teacher &&
                       a.teacher.trim() === b.teacher.trim() &&
                       a.from === b.from;
        if(!shared && a.start < b.end && b.start < a.end){ // تداخل زمني
          a.conflict=true; b.conflict=true;
          a.conflictWith.push(`${b.kidName} · ${b.subj}`);
          b.conflictWith.push(`${a.kidName} · ${a.subj}`);
          pairs.push({
            day,
            a:`${a.kidName} — ${a.subj} (${a.from||'؟'})`,
            b:`${b.kidName} — ${b.subj} (${b.from||'؟'})`
          });
        }
      }
    }
  });
  return { slots, pairs };
}

function renderWeek(){
  const container = document.getElementById('kidContent');
  document.getElementById('emptyState').style.display = 'none';

  if(state.kids.length === 0){
    container.innerHTML = `<div class="card"><p style="color:var(--muted);text-align:center">مفيش ولاد أو مواد مضافة لسه.</p></div>`;
    return;
  }

  const { slots, pairs } = buildWeek();

  const legend = state.kids.map(k=>
    `<span class="item"><span class="dot" style="background:${kidColor(k.id)}"></span>${esc(k.name)}</span>`
  ).join('');

  let banner;
  if(pairs.length === 0){
    banner = `<div class="card" style="border-color:var(--success)"><strong style="color:var(--success)">✅ مفيش أي تعارض في المواعيد بين الأولاد</strong></div>`;
  } else {
    const items = pairs.map(p=>
      `<li style="margin-bottom:6px"><span class="day-badge">${esc(p.day)}</span> ${esc(p.a)} &nbsp;<span style="color:var(--danger-dark);font-weight:700">✕</span>&nbsp; ${esc(p.b)}</li>`
    ).join('');
    banner = `<div class="card" style="border-color:var(--danger);background:#fdeceb">
      <strong style="color:var(--danger-dark)">⚠️ فيه ${pairs.length} تعارض في المواعيد:</strong>
      <ul style="margin:10px 0 0;padding-inline-start:18px;line-height:1.7">${items}</ul>
    </div>`;
  }

  let daysHtml = '';
  WEEK_DAYS.forEach(day=>{
    const ds = slots.filter(s=>s.day===day).sort((a,b)=>{
      if(a.start==null) return 1;
      if(b.start==null) return -1;
      return a.start - b.start;
    });
    let rows;
    if(ds.length === 0){
      rows = `<div class="empty-day">— مفيش حصص —</div>`;
    } else {
      rows = ds.map(s=>{
        const c = kidColor(s.kidId);
        const time = s.from ? (s.from + (s.to ? ' - ' + s.to : '')) : '—';
        return `<div class="slot ${s.conflict?'conflict':''}" style="--kidc:${c}">
          <span class="time">🕐 ${esc(time)}</span>
          <span class="who" style="background:${c}">${esc(s.kidName)}</span>
          <span class="subj">${esc(s.subj)}${s.teacher?` <span class="tchr">— ${esc(s.teacher)}</span>`:''}</span>
          ${s.conflict?`<span class="warn" title="تعارض مع: ${esc(s.conflictWith.join(' / '))}">⚠️ تعارض</span>`:''}
          <button class="icon-btn no-print" title="تغيير الميعاد" onclick="editSubject('${s.kidId}','${s.subId}')">✏️</button>
        </div>`;
      }).join('');
    }
    daysHtml += `<div class="week-day"><h3>${esc(day)} <span class="cnt">(${ds.length} حصة)</span></h3>${rows}</div>`;
  });

  container.innerHTML = `
    <div class="card">
      <h2>📆 الجدول الأسبوعي الموحّد لكل الأولاد</h2>
      <div class="legend">${legend}</div>
    </div>
    ${banner}
    <div class="card">${daysHtml}</div>
  `;
}

// ---------- Reminders (تنبيه قبل كل حصة) ----------
const REMIND_KEY = 'kids-reminders-settings';
const NOTIFIED_KEY = 'kids-reminders-notified';
const AR_DAY_INDEX = { 'الأحد':0,'الاثنين':1,'الثلاثاء':2,'الأربعاء':3,'الخميس':4,'الجمعة':5,'السبت':6 };

let reminderSettings = loadReminderSettings();

function loadReminderSettings(){
  try{
    const raw = localStorage.getItem(REMIND_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { enabled:false, lead:30 };
}
function saveReminderSettings(){
  localStorage.setItem(REMIND_KEY, JSON.stringify(reminderSettings));
}

function loadNotified(){
  const today = new Date().toISOString().slice(0,10);
  let obj = {};
  try{ obj = JSON.parse(localStorage.getItem(NOTIFIED_KEY)) || {}; }catch(e){}
  if(obj.date !== today) obj = { date: today, keys: [] }; // reset every day
  return obj;
}
let notifiedStore = loadNotified();
function markNotified(key){
  notifiedStore.keys.push(key);
  localStorage.setItem(NOTIFIED_KEY, JSON.stringify(notifiedStore));
}

// كل الحصص المستحق تنبيهها دلوقتي (خلال نافذة "قبل الحصة")
function dueReminders(now, leadMin){
  const { slots } = buildWeek();
  const todayStr = now.toISOString().slice(0,10);
  const due = [];
  slots.forEach(s=>{
    if(s.start == null) return;
    const di = AR_DAY_INDEX[s.day];
    if(di == null || now.getDay() !== di) return;
    const startT = new Date(now);
    startT.setHours(Math.floor(s.start/60), s.start%60, 0, 0);
    const remindT = new Date(startT.getTime() - leadMin*60000);
    if(now >= remindT && now < startT){
      due.push({ ...s, startT, key:`${s.subId}|${todayStr}|${s.from}` });
    }
  });
  return due;
}

function checkReminders(){
  if(!reminderSettings.enabled) return;
  notifiedStore = loadNotified(); // يتأكد من إعادة الضبط لو اتغير اليوم
  const due = dueReminders(new Date(), Number(reminderSettings.lead)||30);
  due.forEach(d=>{
    if(notifiedStore.keys.includes(d.key)) return;
    markNotified(d.key);
    fireReminder(d);
  });
}

function fireReminder(d){
  const title = `🔔 حصة ${d.subj} — ${d.kidName}`;
  const body = `الساعة ${d.from}${d.teacher? ' مع '+d.teacher : ''} (بعد ${reminderSettings.lead} دقيقة)`;
  if('Notification' in window && Notification.permission === 'granted'){
    try{ new Notification(title, { body, tag: d.key }); }catch(e){}
  }
  showToast(title, body);
}

function showToast(title, body){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div><strong>${esc(title)}</strong><div style="opacity:.9;margin-top:2px">${esc(body)}</div></div>
    <button class="t-close" onclick="this.parentNode.remove()">✕</button>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 15000);
}

async function enableReminders(){
  reminderSettings.enabled = true;
  saveReminderSettings();
  if('Notification' in window && Notification.permission === 'default'){
    try{ await Notification.requestPermission(); }catch(e){}
  }
  renderReminderCard();
  checkReminders();
}
function disableReminders(){
  reminderSettings.enabled = false;
  saveReminderSettings();
  renderReminderCard();
}
function setLead(v){
  const n = parseInt(v,10);
  reminderSettings.lead = (!isNaN(n) && n>=0) ? n : 30;
  saveReminderSettings();
  renderReminderCard();
}

function renderReminderCard(){
  const el = document.getElementById('reminderCard');
  const permGranted = ('Notification' in window) && Notification.permission === 'granted';
  const hasNotif = ('Notification' in window);
  let statusHtml, actionHtml;
  if(reminderSettings.enabled){
    statusHtml = `<span class="rc-status rc-on">● التنبيهات مفعّلة${permGranted? '' : ' (داخل الصفحة فقط — الإشعارات مش مسموحة)'}</span>`;
    actionHtml = `<button class="btn btn-ghost btn-sm" onclick="disableReminders()">إيقاف</button>`;
  } else {
    statusHtml = `<span class="rc-status rc-off">○ التنبيهات متوقفة</span>`;
    actionHtml = `<button class="btn btn-primary btn-sm" onclick="enableReminders()">🔔 فعّل التنبيهات</button>`;
  }
  el.innerHTML = `
    <span class="rc-title">🔔 تنبيه قبل الحصص</span>
    <span class="rc-lead">قبل الحصة بـ
      <input type="number" min="0" step="5" value="${esc(reminderSettings.lead)}" onchange="setLead(this.value)"> دقيقة</span>
    ${statusHtml}
    ${actionHtml}
    <span class="rc-hint">التنبيه بيشتغل طول ما الصفحة مفتوحة${hasNotif? '' : ' (متصفحك مبيدعمش الإشعارات، فهيظهر تنبيه داخل الصفحة)'} — لتنبيه في الخلفية استخدم تنبيهات جوجل كالندر.</span>
  `;
}

// فحص كل 30 ثانية + فحص فوري عند الفتح
setInterval(checkReminders, 30000);

function render(){
  renderReminderCard();
  renderViewToggle();
  if(viewMode === 'week'){
    document.getElementById('kidsBar').style.display = 'none';
    renderWeek();
  } else {
    document.getElementById('kidsBar').style.display = 'flex';
    renderKidsBar();
    renderKidContent();
  }
}

render();
checkReminders();
</script>
</body>
</html>
